<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideFlow Driver — Earn & Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #1e1e28;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #6ee7b7;
      --accent-dim: rgba(110,231,183,0.12);
      --accent2: #3b82f6;
      --accent2-dim: rgba(59,130,246,0.12);
      --accent3: #f59e0b;
      --danger: #ef4444;
      --text: #eeeef5;
      --text2: #a0a0b0;
      --muted: #52525e;
      --online: #22c55e;
      --r: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .bg-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 60% 40% at 10% 10%, rgba(110,231,183,0.04) 0%, transparent 65%), radial-gradient(ellipse 40% 60% at 90% 90%, rgba(59,130,246,0.04) 0%, transparent 65%); }

    .topbar { position: relative; z-index: 50; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: rgba(8,8,16,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); flex-shrink: 0; }

    .tb-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .logo-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 4px; background: var(--accent3-dim); color: var(--accent3); border: 1px solid rgba(245,158,11,0.2); }

    .online-toggle { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 40px; padding: 6px 12px; cursor: pointer; transition: all 0.3s; user-select: none; }
    .online-toggle.active { border-color: rgba(34,197,94,0.4); background: rgba(34,197,94,0.08); }
    .toggle-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--muted); display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.3s; }
    .online-toggle.active .toggle-dot { background: var(--online); box-shadow: 0 0 12px rgba(34,197,94,0.6); }
    .toggle-label { font-size: 12px; font-weight: 600; color: var(--text2); transition: color 0.3s; }
    .online-toggle.active .toggle-label { color: var(--online); }

    .tb-right { display: flex; align-items: center; gap: 12px; }
    .driver-chip { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 40px; padding: 6px 12px; }
    .driver-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--bg); flex-shrink: 0; }
    .driver-info { display: flex; flex-direction: column; }
    .driver-name { font-size: 12px; font-weight: 600; }
    .driver-plate { font-size: 10px; color: var(--text2); }

    .app-body { position: relative; z-index: 1; flex: 1; display: grid; grid-template-columns: 280px 1fr 340px; overflow: hidden; }

    .sidebar-left { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 20px 16px; gap: 16px; }

    .earnings-card { background: linear-gradient(135deg, rgba(110,231,183,0.08), rgba(59,130,246,0.06)); border: 1px solid rgba(110,231,183,0.15); border-radius: 14px; padding: 18px; }
    .ec-label { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .ec-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .ec-amount { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); }
    .ec-sub { font-size: 11px; color: var(--text2); margin-top: 6px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .stat-label { font-size: 9px; color: var(--text2); margin-top: 4px; }

    .center-panel { display: flex; flex-direction: column; overflow: hidden; }
    .cp-header { padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .cp-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
    .live-badge { font-size: 8px; font-weight: 700; padding: 3px 7px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(110,231,183,0.25); display: flex; align-items: center; gap: 4px; }
    .live-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .order-feed { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .order-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.3s; animation: slideIn 0.35s ease; position: relative; overflow: hidden; }
    @keyframes slideIn { from { opacity:0; transform: translateY(-12px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
    .order-card:hover { border-color: rgba(110,231,183,0.3); background: var(--surface2); }
    .order-card.selected { border-color: var(--accent); background: var(--surface2); box-shadow: 0 0 0 1px var(--accent), inset 0 0 0 1px var(--accent); }

    .oc-urgent { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

    .oc-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .oc-left { flex: 1; }
    .cust-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
    .order-id { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .oc-right { text-align: right; }
    .oc-fare { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--accent); }
    .oc-tier { font-size: 10px; color: var(--text2); }

    .oc-route { font-size: 11px; color: var(--text2); margin: 10px 0; display: flex; flex-direction: column; gap: 6px; }
    .route-item { display: flex; align-items: center; gap: 6px; }
    .route-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .route-dot.from { background: var(--accent); }
    .route-dot.to { background: var(--accent3); }

    .oc-actions { display: grid; grid-template-columns: 1fr 1.2fr; gap: 8px; }
    .btn-action { padding: 9px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: 'Syne', sans-serif; transition: all 0.2s; }
    .btn-decline { background: none; border: 1px solid var(--border2); color: var(--text2); }
    .btn-decline:hover { border-color: var(--danger); color: var(--danger); background: var(--accent3-dim); }
    .btn-accept { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); }
    .btn-accept:hover { opacity: 0.85; transform: scale(0.98); }

    .feed-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); text-align: center; }
    .feed-empty-icon { font-size: 42px; opacity: 0.25; }
    .feed-empty-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text2); }

    .sidebar-right { border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sr-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sr-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.05em; }

    .right-content { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; }

    .cust-profile { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); }
    .cust-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent3), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--bg); flex-shrink: 0; }
    .cust-info { flex: 1; }
    .cust-name-profile { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
    .cust-email { font-size: 10px; color: var(--text2); margin-top: 1px; }

    .detail-section { display: flex; flex-direction: column; gap: 8px; }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
    .detail-row:last-child { border-bottom: none; }
    .dr-label { color: var(--text2); }
    .dr-val { font-weight: 600; }

    .chat-section { display: flex; flex-direction: column; gap: 10px; flex: 1; }
    .chat-msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: var(--surface); border-radius: 12px; padding: 12px; border: 1px solid var(--border); }
    .msg { display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .msg.bot .msg-avatar { background: var(--accent-dim); color: var(--accent); }
    .msg.user .msg-avatar { background: var(--surface2); color: var(--text); }
    .msg-bubble { max-width: 70%; padding: 8px 12px; border-radius: 10px; font-size: 11px; line-height: 1.5; }
    .msg.bot .msg-bubble { background: var(--surface2); border: 1px solid var(--border); }
    .msg.user .msg-bubble { background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(59,130,246,0.1)); border: 1px solid rgba(110,231,183,0.15); }

    .chat-input-wrap { display: flex; gap: 6px; }
    .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; color: var(--text); font-size: 11px; outline: none; }
    .chat-input:focus { border-color: rgba(110,231,183,0.3); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }

    .no-selection { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .no-sel-icon { font-size: 32px; opacity: 0.2; }
    .no-sel-text { font-size: 11px; color: var(--muted); text-align: center; }

    #authGate { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 410px; padding: 28px; background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; }
    .auth-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { font-size: 12px; color: var(--text2); margin-bottom: 20px; }

    .tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 18px; }
    .tab { flex: 1; padding: 8px; border-radius: 8px; border: none; background: none; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--surface3); color: var(--text); }

    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 10px; font-weight: 600; color: var(--text2); margin-bottom: 5px; display: block; letter-spacing: 0.05em; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 12px; outline: none; }
    .form-input:focus { border-color: rgba(110,231,183,0.3); }
    .form-input::placeholder { color: var(--muted); }

    .auth-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); transition: opacity 0.2s; margin-top: 6px; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn-outline { width: 100%; padding: 10px; margin-top: 6px; border-radius: 12px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 12px; transition: all 0.2s; }
    .auth-btn-outline:hover { border-color: var(--text); color: var(--text); }

    .toast { position: fixed; bottom: 20px; left: 20px; background: var(--surface2); border: 1px solid var(--border2); padding: 10px 16px; border-radius: 40px; font-size: 12px; z-index: 300; display: none; align-items: center; gap: 6px; }
    .toast.show { display: flex; animation: toastUp 0.3s ease; }
    @keyframes toastUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>

  <!-- AUTH GATE -->
  <div id="authGate">
    <div class="auth-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div class="logo-icon">🛵</div>
        <div>
          <div class="auth-title">RideFlow</div>
          <div class="auth-sub" style="margin-bottom:0;font-size:10px;">DRIVER MODE</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="tab" onclick="switchAuthTab('register')">Register</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="driver@driver.mail">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input class="form-input" id="loginPassword" type="password" placeholder="••••••••">
        </div>
        <button class="auth-btn" onclick="doLogin()">Sign In</button>
        <button class="auth-btn-outline" onclick="doDemo()">Demo Mode</button>
      </div>

      <div id="registerForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">NAME</label>
          <input class="form-input" id="regName" type="text" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">PLATE NUMBER</label>
          <input class="form-input" id="regPlate" type="text" placeholder="B 4521 XYZ">
        </div>
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input class="form-input" id="regEmail" type="email" placeholder="driver@driver.mail">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input class="form-input" id="regPassword" type="password" placeholder="Min 6 chars">
        </div>
        <button class="auth-btn" onclick="doRegister()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- TOPBAR -->
  <div class="topbar" id="driverApp" style="display:none;">
    <div class="tb-left">
      <div class="logo">
        <div class="logo-icon">🛵</div>
        <span>RideFlow</span>
        <span class="logo-badge">DRIVER</span>
      </div>
      <div class="online-toggle" id="onlineToggle" onclick="toggleOnline()">
        <div class="toggle-dot" id="toggleDot">●</div>
        <span class="toggle-label" id="toggleLabel">Offline</span>
      </div>
    </div>
    <div class="tb-right">
      <div class="driver-chip">
        <div class="driver-avatar" id="driverAvatarTop">D</div>
        <div class="driver-info">
          <div class="driver-name" id="driverNameTop">Driver</div>
          <div class="driver-plate" id="driverPlateTop">B 0000 DMO</div>
        </div>
      </div>
    </div>
  </div>

  <!-- APP BODY -->
  <div class="app-body" id="driverAppBody" style="display:none;">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar-left">
      <div class="earnings-card">
        <div class="ec-label">Today's Earnings</div>
        <div class="ec-amount" id="todayEarnings">Rp 0</div>
        <div class="ec-sub" id="earningsSub">0 trips today</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="statTrips">0</div>
          <div class="stat-label">Trips Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statRating">4.92</div>
          <div class="stat-label">Rating</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statKm">0km</div>
          <div class="stat-label">Distance</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statTime">00:00</div>
          <div class="stat-label">Online</div>
        </div>
      </div>
    </div>

    <!-- CENTER PANEL -->
    <div class="center-panel">
      <div class="cp-header">
        <div class="cp-title">Order Feed</div>
        <div class="live-badge"><div class="live-dot"></div> LIVE</div>
      </div>

      <div class="order-feed" id="orderFeed">
        <div class="feed-empty">
          <div class="feed-empty-icon">📡</div>
          <div class="feed-empty-title">Go Online to Receive Orders</div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="sidebar-right">
      <div class="sr-header">
        <div class="sr-title">Order Details & Chat</div>
      </div>

      <div class="right-content" id="rightContent">
        <div class="no-selection">
          <div class="no-sel-icon">👆</div>
          <div class="no-sel-text">Select an order to view details</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <script>
    let ws = null;
    let currentDriver = null;
    let driverOnline = false;
    let selectedOrder = null;
    const orders = [];

    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      ws = new WebSocket(`${protocol}//${host}`);

      ws.onopen = () => {
        console.log('Connected to server');
        if (currentDriver) authenticate();
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      };

      ws.onerror = (err) => console.error('WebSocket error:', err);
      ws.onclose = () => {
        console.log('Disconnected');
        setTimeout(initWebSocket, 3000);
      };
    }

    function authenticate() {
      if (!currentDriver || !ws) return;
      ws.send(JSON.stringify({
        type: 'auth',
        uid: currentDriver.uid,
        type: 'driver',
        name: currentDriver.name,
        plate: currentDriver.plate,
      }));
    }

    function handleServerMessage(data) {
      switch (data.type) {
        case 'auth_success':
          console.log('Driver authenticated:', data.uid);
          break;
        case 'new_order_available':
          const order = {
            id: data.orderId,
            customerName: data.customerName,
            pickup: data.pickup,
            destination: data.destination,
            service: data.service,
            vehicle: data.vehicle,
            fare: data.fare,
          };
          orders.push(order);
          renderOrders();
          showToast(`📦 New order from ${data.customerName}`);
          break;
        case 'order_accepted_confirmed':
          selectedOrder = data.order;
          updateRightPanel();
          showToast(`✅ Order accepted!`);
          break;
        case 'new_message':
          if (selectedOrder && selectedOrder.id === data.orderId) {
            addChatMessage('driver', data.message.text, data.message.senderName);
          }
          break;
        case 'trip_started_confirmed':
          showToast(`🚗 Trip started!`);
          break;
        case 'trip_completed_confirmed':
          showToast(`✅ Trip completed! Earned Rp ${data.fare.toLocaleString('id-ID')}`);
          selectedOrder = null;
          updateRightPanel();
          break;
        case 'order_cancelled':
          orders.splice(orders.findIndex(o => o.id === data.orderId), 1);
          renderOrders();
          showToast(`❌ Order cancelled by customer`);
          break;
      }
    }

    function switchAuthTab(tab) {
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showToast('❌ Fill all fields'); return; }
      if (!email.includes('@driver.mail')) { showToast('❌ Must use @driver.mail'); return; }

      currentDriver = { uid: 'drv_' + Date.now(), email, name: email.split('@')[0], plate: 'B 0000 001' };
      onDriverLoggedIn();
    }

    function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const plate = document.getElementById('regPlate').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!name || !plate || !email || !password) { showToast('❌ Fill all fields'); return; }
      if (!email.includes('@driver.mail')) { showToast('❌ Must use @driver.mail'); return; }

      currentDriver = { uid: 'drv_' + Date.now(), email, name, plate };
      onDriverLoggedIn();
    }

    function doDemo() {
      currentDriver = { uid: 'demo_' + Date.now(), email: 'demo@driver.mail', name: 'Ahmad Fauzi', plate: 'B 4521 XYZ' };
      onDriverLoggedIn();
    }

    function onDriverLoggedIn() {
      document.getElementById('authGate').style.display = 'none';
      document.getElementById('driverApp').style.display = 'flex';
      document.getElementById('driverAppBody').style.display = 'grid';
      document.getElementById('driverNameTop').textContent = currentDriver.name;
      document.getElementById('driverPlateTop').textContent = currentDriver.plate;
      document.getElementById('driverAvatarTop').textContent = currentDriver.name.charAt(0).toUpperCase();
      initWebSocket();
    }

    function toggleOnline() {
      driverOnline = !driverOnline;
      const toggle = document.getElementById('onlineToggle');
      document.getElementById('toggleDot').textContent = driverOnline ? '✓' : '●';
      document.getElementById('toggleLabel').textContent = driverOnline ? 'Online' : 'Offline';
      toggle.classList.toggle('active', driverOnline);

      if (driverOnline) {
        document.getElementById('orderFeed').innerHTML = '<div class="feed-empty"><div class="feed-empty-icon">⏳</div><div class="feed-empty-title">Waiting for orders...</div></div>';
      } else {
        orders.length = 0;
        renderOrders();
      }
    }

    function renderOrders() {
      const feed = document.getElementById('orderFeed');
      if (!driverOnline || orders.length === 0) {
        feed.innerHTML = `<div class="feed-empty"><div class="feed-empty-icon">${driverOnline ? '⏳' : '📡'}</div><div class="feed-empty-title">${driverOnline ? 'Waiting for orders...' : 'Go Online to Receive Orders'}</div></div>`;
        return;
      }

      feed.innerHTML = orders.map(order => `
        <div class="order-card ${selectedOrder?.id === order.id ? 'selected' : ''}" onclick="selectOrder('${order.id}')">
          <div class="oc-urgent"></div>
          <div class="oc-header">
            <div class="oc-left">
              <div class="cust-name">${order.customerName}</div>
              <div class="order-id">#${order.id.substring(0, 8)}</div>
            </div>
            <div class="oc-right">
              <div class="oc-fare">Rp ${order.fare.toLocaleString('id-ID')}</div>
              <div class="oc-tier">${order.vehicle === 'motor' ? '🏍' : '🚗'}</div>
            </div>
          </div>
          <div class="oc-route">
            <div class="route-item"><div class="route-dot from"></div> ${order.pickup}</div>
            <div class="route-item"><div class="route-dot to"></div> ${order.destination}</div>
          </div>
          <div class="oc-actions">
            <button class="btn-action btn-decline" onclick="event.stopPropagation();declineOrder('${order.id}')">Decline</button>
            <button class="btn-action btn-accept" onclick="event.stopPropagation();acceptOrder('${order.id}')">Accept</button>
          </div>
        </div>
      `).join('');
    }

    function selectOrder(id) {
      selectedOrder = orders.find(o => o.id === id);
      renderOrders();
      updateRightPanel();
    }

    function updateRightPanel() {
      const panel = document.getElementById('rightContent');
      if (!selectedOrder) {
        panel.innerHTML = '<div class="no-selection"><div class="no-sel-icon">👆</div><div class="no-sel-text">Select an order</div></div>';
        return;
      }

      panel.innerHTML = `
        <div class="cust-profile">
          <div class="cust-avatar">${selectedOrder.customerName.charAt(0)}</div>
          <div class="cust-info">
            <div class="cust-name-profile">${selectedOrder.customerName}</div>
            <div class="cust-email">Customer</div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-row"><span class="dr-label">From</span><span class="dr-val" style="text-align:right;">${selectedOrder.pickup}</span></div>
          <div class="detail-row"><span class="dr-label">To</span><span class="dr-val" style="text-align:right;">${selectedOrder.destination}</span></div>
          <div class="detail-row"><span class="dr-label">Service</span><span class="dr-val">${selectedOrder.service}</span></div>
          <div class="detail-row"><span class="dr-label">Fare</span><span class="dr-val" style="color:var(--accent);">Rp ${selectedOrder.fare.toLocaleString('id-ID')}</span></div>
        </div>

        <div class="chat-section">
          <div class="chat-msgs" id="chatMsgs"></div>
          <div class="chat-input-wrap">
            <input class="chat-input" id="chatInput" type="text" placeholder="Type message..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button class="send-btn" onclick="sendMessage()">→</button>
          </div>
        </div>
      `;
    }

    function addChatMessage(sender, text, senderName = null) {
      const container = document.getElementById('chatMsgs');
      if (!container) return;
      const div = document.createElement('div');
      div.className = `msg ${sender === 'user' ? 'user' : 'bot'}`;
      div.innerHTML = `
        <div class="msg-avatar">${sender === 'user' ? '👤' : '🚗'}</div>
        <div class="msg-bubble">${text}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      if (!selectedOrder || !currentDriver || !ws) return;
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      ws.send(JSON.stringify({
        type: 'send_message',
        uid: currentDriver.uid,
        orderId: selectedOrder.id,
        text,
      }));

      addChatMessage('user', text);
      input.value = '';
    }

    function acceptOrder(id) {
      if (!currentDriver || !ws) return;
      ws.send(JSON.stringify({
        type: 'accept_order',
        driverId: currentDriver.uid,
        orderId: id,
      }));
      orders.splice(orders.findIndex(o => o.id === id), 1);
      renderOrders();
    }

    function declineOrder(id) {
      if (!ws) return;
      ws.send(JSON.stringify({
        type: 'decline_order',
        orderId: id,
      }));
      orders.splice(orders.findIndex(o => o.id === id), 1);
      renderOrders();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.getElementById('authGate').style.display = 'flex';
  </script>
</body>
</html>
