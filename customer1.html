<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideFlow — Book Your Ride</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080810;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #1e1e28;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #6ee7b7;
      --accent-dim: rgba(110,231,183,0.12);
      --accent2: #3b82f6;
      --accent2-dim: rgba(59,130,246,0.12);
      --accent3: #f59e0b;
      --accent3-dim: rgba(245,158,11,0.12);
      --danger: #ef4444;
      --text: #eeeef5;
      --text2: #a0a0b0;
      --muted: #52525e;
      --r: 16px;
      --header-h: 68px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    a { text-decoration: none; color: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 50% at 15% 15%, rgba(110,231,183,0.055) 0%, transparent 65%), 
                  radial-gradient(ellipse 50% 70% at 85% 85%, rgba(59,130,246,0.045) 0%, transparent 65%);
    }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--header-h);
      padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      backdrop-filter: blur(24px) saturate(180%);
      background: rgba(8,8,16,0.92);
      border-bottom: 1px solid var(--border);
    }

    .logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .logo-icon { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 15px; }

    .header-right { display: flex; align-items: center; gap: 12px; }
    .status-badge { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

    .header-btn { padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-ghost { background: none; border: 1px solid var(--border2); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); font-weight: 600; }
    .btn-primary:hover { opacity: 0.85; }

    .user-chip { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; }
    .avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--bg); }

    #authGate { position: fixed; inset: 0; z-index: 500; background: var(--bg); display: flex; align-items: center; justify-content: center; }
    .auth-card { width: 100%; max-width: 420px; padding: 32px; background: var(--surface); border: 1px solid var(--border2); border-radius: 22px; }
    .auth-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

    .tabs { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 9px; border-radius: 8px; border: none; background: none; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--surface3); color: var(--text); }

    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; letter-spacing: 0.05em; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: rgba(110,231,183,0.35); }
    .form-input::placeholder { color: var(--muted); }

    .auth-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); transition: opacity 0.2s; margin-top: 6px; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn-outline { width: 100%; padding: 12px; margin-top: 8px; border-radius: 12px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 13px; transition: all 0.2s; }
    .auth-btn-outline:hover { border-color: var(--text); color: var(--text); }

    #appShell { position: relative; z-index: 1; min-height: 100vh; padding-top: var(--header-h); display: none; }
    #appShell.visible { display: block; }

    .main-grid { display: grid; grid-template-columns: 1fr 420px; height: calc(100vh - var(--header-h)); gap: 0; }

    .map-section { background: linear-gradient(135deg, rgba(110,231,183,0.08), rgba(59,130,246,0.06)); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .map-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); }

    .order-panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .order-header { padding: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .order-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }

    .order-tabs { display: flex; gap: 8px; margin-top: 16px; }
    .order-tab { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; background: none; color: var(--text2); cursor: pointer; transition: all 0.2s; }
    .order-tab.active { background: var(--surface2); color: var(--text); }

    .order-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
    .order-content.active { display: flex; flex-direction: column; }

    .search-panel { display: flex; flex-direction: column; gap: 16px; }
    .search-btn { padding: 16px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .search-btn:hover { opacity: 0.85; }

    .order-active { display: flex; flex-direction: column; gap: 16px; }
    .driver-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; animation: slideUp 0.4s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .driver-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: var(--bg); flex-shrink: 0; }
    .driver-info { flex: 1; }
    .driver-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
    .driver-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .driver-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; }

    .order-status { background: var(--accent-dim); border: 1px solid rgba(110,231,183,0.2); border-radius: 12px; padding: 12px; margin: 16px 0; text-align: center; }
    .status-label { font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.05em; }
    .status-text { font-size: 13px; font-weight: 600; color: var(--accent); margin-top: 4px; }

    .chat-section { display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; min-height: 200px; background: var(--surface); border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
    .msg { display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .msg.bot .msg-avatar { background: var(--accent-dim); color: var(--accent); }
    .msg.user .msg-avatar { background: var(--surface2); color: var(--text); }

    .msg-bubble { max-width: 80%; padding: 10px 13px; border-radius: 12px; font-size: 12.5px; line-height: 1.5; }
    .msg.bot .msg-bubble { background: var(--surface2); border: 1px solid var(--border); }
    .msg.user .msg-bubble { background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(59,130,246,0.1)); border: 1px solid rgba(110,231,183,0.15); }

    .chat-input-wrap { display: flex; gap: 8px; }
    .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; color: var(--text); font-size: 12.5px; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: rgba(110,231,183,0.35); }
    .chat-input::placeholder { color: var(--muted); }

    .send-btn { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }

    .modal-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.72); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }

    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 28px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; animation: modalPop 0.3s ease; }
    @keyframes modalPop { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

    .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }

    .booking-form { display: flex; flex-direction: column; gap: 14px; }
    .service-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
    .service-btn { padding: 12px; border-radius: 12px; border: 1.5px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
    .service-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .cancel-btn { padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; margin-top: 8px; }
    .cancel-btn:hover { border-color: var(--danger); color: var(--danger); }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); padding: 12px 20px; border-radius: 40px; font-size: 13px; z-index: 400; display: none; align-items: center; gap: 8px; white-space: nowrap; }
    .toast.show { display: flex; animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(110,231,183,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .searching-state { text-align: center; padding: 20px; }
    .searching-icon { font-size: 32px; margin-bottom: 12px; animation: bounce 1s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>

  <!-- AUTH GATE -->
  <div id="authGate">
    <div class="auth-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
        <div class="logo-icon">🛵</div>
        <div>
          <div class="auth-title">RideFlow</div>
          <div class="auth-sub" style="margin-bottom:0;font-size:11px;">Customer Portal</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="tab" onclick="switchAuthTab('register')">Register</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="user@customer.mail">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input class="form-input" id="loginPassword" type="password" placeholder="••••••••">
        </div>
        <button class="auth-btn" onclick="doLogin()">Sign In</button>
        <button class="auth-btn-outline" onclick="doGuestMode()">Continue as Guest</button>
      </div>

      <div id="registerForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">FULL NAME</label>
          <input class="form-input" id="regName" type="text" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <input class="form-input" id="regEmail" type="email" placeholder="user@customer.mail">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input class="form-input" id="regPassword" type="password" placeholder="Min. 6 characters">
        </div>
        <button class="auth-btn" onclick="doRegister()">Create Account</button>
        <button class="auth-btn-outline" onclick="doGuestMode()">Continue as Guest</button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo" onclick="location.reload()">
      <div class="logo-icon">🛵</div>
      RideFlow
    </div>
    <div class="header-right">
      <div class="status-badge" id="statusBadge">
        <div class="status-dot"></div>
        <span>Ready to ride</span>
      </div>
      <div id="headerAuth">
        <button class="header-btn btn-ghost" onclick="showAuthGate()">Sign In</button>
        <button class="header-btn btn-primary" style="margin-left:6px;" onclick="showAuthGate('register')">Register</button>
      </div>
      <div id="headerUser" style="display:none;">
        <div class="user-chip" onclick="showUserMenu()">
          <div class="avatar-sm" id="headerAvatar">U</div>
          <span id="headerName">User</span>
        </div>
      </div>
    </div>
  </header>

  <!-- APP SHELL -->
  <div id="appShell">
    <div class="main-grid">
      <!-- MAP SECTION -->
      <div class="map-section">
        <div class="map-placeholder" id="mapPlaceholder">
          📍 Map Integration<br><span style="font-size:12px;color:var(--text2);">Pickup & destination map shows here</span>
        </div>
      </div>

      <!-- ORDER PANEL -->
      <div class="order-panel">
        <div class="order-header">
          <div class="order-title">My Ride</div>
          <div class="order-tabs">
            <button class="order-tab active" onclick="switchOrderTab('search')">Book</button>
            <button class="order-tab" onclick="switchOrderTab('chat')">Chat</button>
          </div>
        </div>

        <!-- SEARCH/ORDER VIEW -->
        <div class="order-content active" id="searchView">
          <div class="search-panel">
            <button class="search-btn" onclick="openBooking()">
              🔍 Find a Driver
            </button>
          </div>

          <div id="orderActiveContent" style="display:none;flex:1;flex-direction:column;gap:16px;">
            <div class="order-status">
              <div class="status-label">ORDER STATUS</div>
              <div class="status-text" id="orderStatusText">Searching for driver...</div>
            </div>

            <div id="driverFoundContent" style="display:none;">
              <div class="driver-card">
                <div class="driver-avatar" id="driverAvatarCard">D</div>
                <div style="flex:1;">
                  <div class="driver-name" id="driverNameCard">Driver Name</div>
                  <div class="driver-meta" id="driverPlateCard">License Plate</div>
                  <div class="driver-rating">⭐ <span id="driverRatingCard">4.92</span> (250+ trips)</div>
                </div>
              </div>
            </div>

            <div style="display:flex;gap:10px;">
              <button class="cancel-btn" style="flex:1;" onclick="cancelOrder()">❌ Cancel Order</button>
            </div>
          </div>
        </div>

        <!-- CHAT VIEW -->
        <div class="order-content" id="chatView">
          <div class="chat-section">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-wrap">
              <input class="chat-input" id="chatInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
              <button class="send-btn" onclick="sendMessage()">
                <svg width="16" height="16" fill="white" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" fill="none"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOOKING MODAL -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal">
      <div class="modal-title">Book Your Ride</div>
      <div class="modal-sub">Fill in your trip details</div>

      <div class="booking-form">
        <div>
          <label class="form-label">PICKUP LOCATION</label>
          <input class="form-input" id="pickupInput" type="text" placeholder="Where from?">
        </div>

        <div>
          <label class="form-label">DESTINATION</label>
          <input class="form-input" id="destInput" type="text" placeholder="Where to?">
        </div>

        <div>
          <label class="form-label" style="margin-bottom:10px;">SERVICE TYPE</label>
          <div class="service-selector">
            <button class="service-btn active" onclick="selectService('ride')">🛵 Ride</button>
            <button class="service-btn" onclick="selectService('delivery')">📦 Delivery</button>
          </div>
        </div>

        <div>
          <label class="form-label" style="margin-bottom:10px;">VEHICLE</label>
          <div class="service-selector">
            <button class="service-btn active" onclick="selectVehicle('motor')">🏍 Motor</button>
            <button class="service-btn" onclick="selectVehicle('car')">🚗 Car</button>
          </div>
        </div>

        <button class="auth-btn" style="margin-top:12px;" onclick="submitBooking()">
          <span id="bookingBtnText">Find Driver</span>
        </button>
        <button class="cancel-btn" onclick="closeModal('bookingModal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- USER MENU MODAL -->
  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:340px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div class="avatar-sm" id="menuAvatar" style="width:48px;height:48px;font-size:20px;">U</div>
        <div>
          <div class="modal-title" style="margin-bottom:0;font-size:16px;" id="menuName">User</div>
          <div style="font-size:12px;color:var(--text2);" id="menuEmail">—</div>
        </div>
      </div>
      <button class="auth-btn" style="background:linear-gradient(135deg,rgba(239,68,68,0.3),rgba(239,68,68,0.2));color:var(--danger);margin:0;" onclick="doSignOut()">Sign Out</button>
      <button class="cancel-btn" onclick="closeModal('userMenuModal')">Close</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <script>
    let ws = null;
    let currentUser = null;
    let currentOrder = null;
    let currentDriver = null;
    let bookingState = { service: 'ride', vehicle: 'motor' };
    const chatMessages = [];

    function initWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      ws = new WebSocket(`${protocol}//${host}`);

      ws.onopen = () => {
        console.log('Connected to server');
        if (currentUser) authenticate();
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      };

      ws.onerror = (err) => console.error('WebSocket error:', err);
      ws.onclose = () => {
        console.log('Disconnected from server');
        setTimeout(initWebSocket, 3000);
      };
    }

    function authenticate() {
      if (!currentUser || !ws) return;
      ws.send(JSON.stringify({
        type: 'auth',
        uid: currentUser.uid,
        type: 'customer',
        name: currentUser.name,
        email: currentUser.email,
      }));
    }

    function handleServerMessage(data) {
      switch (data.type) {
        case 'auth_success':
          console.log('Authenticated:', data.uid);
          break;
        case 'order_created':
          currentOrder = data.order;
          showOrderStatus();
          addChatMessage('bot', `🔍 Searching for drivers near ${currentOrder.pickup}...`);
          break;
        case 'driver_found':
          currentDriver = data.driver;
          currentOrder.status = 'accepted';
          updateOrderUI();
          addChatMessage('bot', `✅ Driver found! ${currentDriver.name} is on the way!`);
          break;
        case 'new_message':
          addChatMessage('driver', data.message.text, data.message.senderName);
          break;
        case 'trip_started':
          currentOrder.status = 'in_progress';
          updateOrderUI();
          addChatMessage('bot', '🚗 Trip started!');
          break;
        case 'trip_completed':
          currentOrder.status = 'completed';
          updateOrderUI();
          addChatMessage('bot', `✅ Trip completed! Fare: Rp ${data.fare.toLocaleString('id-ID')}`);
          break;
        case 'order_cancelled':
          currentOrder = null;
          currentDriver = null;
          resetOrderUI();
          addChatMessage('bot', 'Order cancelled by customer');
          break;
        case 'driver_location_updated':
          // Update driver location on map (optional)
          break;
      }
    }

    function switchAuthTab(tab) {
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) { showToast('❌ Fill all fields'); return; }
      if (!email.includes('@customer.mail')) { showToast('❌ Must use @customer.mail'); return; }

      currentUser = { uid: 'cust_' + Date.now(), email, name: email.split('@')[0] };
      onUserLoggedIn();
    }

    function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!name || !email || !password) { showToast('❌ Fill all fields'); return; }
      if (!email.includes('@customer.mail')) { showToast('❌ Must use @customer.mail'); return; }

      currentUser = { uid: 'cust_' + Date.now(), email, name };
      onUserLoggedIn();
    }

    function doGuestMode() {
      currentUser = { uid: 'guest_' + Date.now(), email: '', name: 'Guest' };
      onUserLoggedIn();
    }

    function onUserLoggedIn() {
      document.getElementById('authGate').style.display = 'none';
      document.getElementById('appShell').classList.add('visible');
      document.getElementById('headerAuth').style.display = 'none';
      document.getElementById('headerUser').style.display = 'block';
      document.getElementById('headerAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
      document.getElementById('headerName').textContent = currentUser.name;
      initWebSocket();
    }

    function showAuthGate(tab = 'login') {
      document.getElementById('authGate').style.display = 'flex';
      if (tab === 'register') switchAuthTab('register');
    }

    function showUserMenu() {
      document.getElementById('menuAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
      document.getElementById('menuName').textContent = currentUser.name;
      document.getElementById('menuEmail').textContent = currentUser.email || 'Guest mode';
      openModal('userMenuModal');
    }

    function doSignOut() {
      closeModal('userMenuModal');
      if (ws) ws.close();
      currentUser = null;
      currentOrder = null;
      currentDriver = null;
      document.getElementById('authGate').style.display = 'flex';
      document.getElementById('appShell').classList.remove('visible');
      document.getElementById('headerAuth').style.display = 'flex';
      document.getElementById('headerUser').style.display = 'none';
      showToast('👋 Signed out');
    }

    function openBooking() {
      document.getElementById('pickupInput').value = '';
      document.getElementById('destInput').value = '';
      openModal('bookingModal');
    }

    function selectService(service) {
      bookingState.service = service;
      document.querySelectorAll('.service-selector')[0].querySelectorAll('.service-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (service === 'ride' && i === 0) || (service === 'delivery' && i === 1));
      });
    }

    function selectVehicle(vehicle) {
      bookingState.vehicle = vehicle;
      document.querySelectorAll('.service-selector')[1].querySelectorAll('.service-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (vehicle === 'motor' && i === 0) || (vehicle === 'car' && i === 1));
      });
    }

    function submitBooking() {
      const pickup = document.getElementById('pickupInput').value.trim();
      const dest = document.getElementById('destInput').value.trim();
      if (!pickup || !dest) { showToast('❌ Fill pickup & destination'); return; }

      closeModal('bookingModal');

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'book_ride',
          customerId: currentUser.uid,
          pickup,
          destination: dest,
          service: bookingState.service,
          vehicle: bookingState.vehicle,
        }));
      }
    }

    function cancelOrder() {
      if (!currentOrder) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'cancel_order',
          customerId: currentUser.uid,
          orderId: currentOrder.id,
        }));
      }
    }

    function showOrderStatus() {
      document.getElementById('searchView').innerHTML = '';
      const content = document.getElementById('orderActiveContent');
      content.style.display = 'flex';
      document.querySelector('.order-content.active').innerHTML = content.innerHTML;
    }

    function updateOrderUI() {
      if (!currentOrder) return;
      document.getElementById('orderStatusText').textContent = currentOrder.status === 'accepted' ? '✅ Driver Found!' : '🔍 Searching...';

      if (currentDriver) {
        document.getElementById('driverFoundContent').style.display = 'block';
        document.getElementById('driverAvatarCard').textContent = currentDriver.name.charAt(0).toUpperCase();
        document.getElementById('driverNameCard').textContent = currentDriver.name;
        document.getElementById('driverPlateCard').textContent = currentDriver.plate;
        document.getElementById('driverRatingCard').textContent = currentDriver.rating;
      }
    }

    function resetOrderUI() {
      const searchPanel = document.getElementById('searchView');
      searchPanel.innerHTML = '<div class="search-panel"><button class="search-btn" onclick="openBooking()">🔍 Find a Driver</button></div>';
      chatMessages.length = 0;
      document.getElementById('chatMessages').innerHTML = '';
    }

    function addChatMessage(sender, text, senderName = null) {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `msg ${sender === 'user' ? 'user' : 'bot'}`;
      const avatar = sender === 'user' ? currentUser.name.charAt(0).toUpperCase() : sender === 'driver' ? '👤' : '🤖';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      div.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div>
          <div class="msg-bubble">${text}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;">${time}</div>
        </div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentOrder) return;

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'send_message',
          uid: currentUser.uid,
          orderId: currentOrder.id,
          text,
        }));
      }

      addChatMessage('user', text);
      input.value = '';
    }

    function switchOrderTab(tab) {
      document.querySelectorAll('.order-tab').forEach((el, i) => {
        el.classList.toggle('active', (tab === 'search' && i === 0) || (tab === 'chat' && i === 1));
      });
      document.querySelectorAll('.order-content').forEach((el, i) => {
        el.classList.toggle('active', (tab === 'search' && i === 0) || (tab === 'chat' && i === 1));
      });
    }

    function openModal(id) {
      document.getElementById(id).classList.add('show');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
